<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGradient)"/>
  
  <!-- Unity-style cube (3D effect) -->
  <g transform="translate(128, 128)">
    <!-- Back faces (darker) -->
    <path d="M -40,-20 L 0,-40 L 40,-20 L 0,0 Z" fill="#666666" opacity="0.6"/>
    <path d="M 40,-20 L 40,30 L 0,50 L 0,0 Z" fill="#444444" opacity="0.8"/>
    
    <!-- Front faces (lighter) -->
    <path d="M -40,-20 L -40,30 L 0,50 L 0,0 Z" fill="url(#cubeGradient)"/>
    <path d="M -40,30 L 0,50 L 40,30 L 0,10 Z" fill="#CCCCCC"/>
    
    <!-- Top face (highlighted) -->
    <path d="M -40,-20 L 0,-40 L 40,-20 L 0,0 Z" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Tool icon overlay (wrench) -->
    <g transform="translate(10, 40)">
      <path d="M -15,-5 L -12,-2 L 8,-22 L 12,-25 L 15,-22 L 18,-19 L 15,-12 L 10,-8 L -10,12 L -13,9 Z" 
            fill="#FFB74D" stroke="#F57C00" stroke-width="1.5"/>
      <circle cx="12" cy="-20" r="3" fill="#FFF" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Letter "U" for UDev -->
  <text x="128" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        text-anchor="middle" fill="#FFFFFF" opacity="0.9">U</text>
</svg>
